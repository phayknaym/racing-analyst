<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>QuantRace AU | Automated Intelligence</title>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        :root { --accent: #00ff88; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --sidebar: #0b1120; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 320px; background: var(--sidebar); border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #334155; }
        #raceList { flex: 1; overflow-y: auto; padding: 10px; }
        
        .race-card { background: var(--card); padding: 12px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .race-card:hover { border-color: var(--accent); }
        .race-card .time { font-size: 12px; color: var(--accent); }
        .race-card .venue { font-weight: bold; display: block; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        header { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; background: #111827; }
        .content-body { padding: 40px; max-width: 900px; margin: auto; width: 100%; }
        
        .api-inputs { display: flex; gap: 10px; }
        input { background: #1e293b; border: 1px solid #334155; color: white; padding: 8px 12px; border-radius: 6px; font-size: 13px; }
        
        .analysis-box { background: var(--card); border-radius: 12px; padding: 30px; min-height: 400px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        button.load-btn { background: var(--accent); color: black; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; color: #94a3b8; font-size: 12px; padding: 10px; border-bottom: 2px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 style="color: var(--accent); margin: 0;">QuantRace AU</h2>
        <input type="password" id="oddsApiKey" placeholder="The Odds API Key" style="width: 80%; margin-top: 10px;">
        <button class="load-btn" onclick="fetchRaces()">LOAD TODAY'S RACES</button>
    </div>
    <div id="raceList">
        <p style="padding: 20px; color: #64748b; text-align: center;">Enter API Key and click Load to see upcoming Australian races.</p>
    </div>
</div>

<div class="main-content">
    <header>
        <div class="api-inputs">
            <input type="password" id="geminiApiKey" placeholder="Gemini API Key">
        </div>
        <div id="statusLabel" style="color: #94a3b8; font-size: 14px;">Select a race to begin analysis</div>
    </header>

    <div class="content-body">
        <div class="analysis-box" id="analysisResult">
            <h2 id="raceHeading">Race Intelligence</h2>
            <p style="color: #94a3b8;">Select a race from the sidebar. Gemini will pull the field data and calculate win probabilities based on live odds and historical patterns.</p>
        </div>
    </div>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    let currentRaces = [];

    // 1. Fetch upcoming Australian races automatically
    window.fetchRaces = async () => {
        const apiKey = document.getElementById('oddsApiKey').value;
        const list = document.getElementById('raceList');
        if (!apiKey) return alert("Please enter your Odds API Key!");

        list.innerHTML = "<p style='text-align:center;'>Fetching markets...</p>";

        try {
            // This pulls upcoming Horse Racing from the AU region
            const response = await fetch(`https://api.the-odds-api.com/v4/sports/horse_racing_au/odds/?apiKey=${apiKey}&regions=au&markets=win`);
            const data = await response.json();
            
            if (data.error) throw new Error(data.error);
            
            currentRaces = data;
            list.innerHTML = "";
            
            data.forEach((race, index) => {
                const startTime = new Date(race.commence_time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const div = document.createElement('div');
                div.className = 'race-card';
                div.onclick = () => analyzeRace(index);
                div.innerHTML = `
                    <span class="venue">${race.bookmakers[0]?.markets[0]?.outcomes.length || 'Field'} Runners</span>
                    <span class="venue">${race.home_team || 'Australian Race'}</span>
                    <span class="time">Starts at ${startTime}</span>
                `;
                list.appendChild(div);
            });
        } catch (e) {
            list.innerHTML = `<p style='color:red; padding:10px;'>Error: ${e.message}</p>`;
        }
    };

    // 2. Analyze the selected race using Gemini
    window.analyzeRace = async (index) => {
        const geminiKey = document.getElementById('geminiApiKey').value;
        const display = document.getElementById('analysisResult');
        const race = currentRaces[index];

        if (!geminiKey) return alert("Please enter your Gemini API Key in the top header!");

        display.innerHTML = "<h3>Consulting Gemini...</h3><p>Calculating probabilities for " + race.home_team + "...</p>";

        try {
            const genAI = new GoogleGenerativeAI(geminiKey);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            // Prepare the runner data for Gemini
            const runners = race.bookmakers[0].markets[0].outcomes.map(o => `${o.name} (Odds: $${o.price})`).join(", ");

            const prompt = `
                Act as an Australian Horse Racing Quant. Analyze this field for ${race.home_team}: ${runners}.
                Current conditions: Assume a standard Good 4 track unless data suggests otherwise.
                
                Provide a clean HTML table including:
                - Horse Name
                - Win Percentage (Total field must equal 100%)
                - Fair Price (100 / Win%)
                - Recommendation (Value vs Underlay)
                
                Finish with a 'Pro-Insight' sentence on which horse has the best statistical profile.
                Do not use Markdown. Use only HTML.
            `;

            const result = await model.generateContent(prompt);
            display.innerHTML = `<div class='analysis-view'><h2>${race.home_team} Analysis</h2>${result.response.text()}</div>`;
        } catch (e) {
            display.innerHTML = "Error: " + e.message;
        }
    };
</script>

</body>
</html>
