<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QuantRace Mobile</title>
    <style>
        :root { --accent: #00ff88; --bg: #090d16; --card: #151f32; --text: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 0;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }
        header { padding: 12px 16px; background: #111827; border-bottom: 1px solid #24344d; display: flex; flex-direction: column; gap: 10px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; }
        .brand { color: var(--accent); margin: 0; font-size: 18px; font-weight: bold; }
        .status { font-size: 11px; color: #64748b; }
        input[type="password"] { 
            background: #1e293b; border: 1px solid #334155; color: white; 
            padding: 10px 12px; border-radius: 8px; font-size: 14px; outline: none; width: 100%;
        }
        .app-body { flex: 1; position: relative; overflow: hidden; }
        .screen { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 16px; display: none; padding-bottom: 80px; }
        .screen.active { display: block; }
        .race-card { 
            background: var(--card); padding: 16px; margin-bottom: 12px; border-radius: 12px; 
            cursor: pointer; border: 1px solid #24344d;
        }
        .race-card .venue { font-size: 16px; font-weight: bold; color: #fff; margin: 4px 0; display: block;}
        .race-card .time { font-size: 12px; color: var(--accent); }
        .analysis-box { background: var(--card); border-radius: 12px; padding: 16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0b1120; border-radius: 10px; overflow: hidden; font-size: 13px; }
        th { text-align: left; color: #94a3b8; font-size: 11px; padding: 10px 8px; border-bottom: 2px solid #24344d; background: #111827; }
        td { padding: 12px 8px; border-bottom: 1px solid #24344d; }
        .value-green { color: #34d399; font-weight: bold; background: #065f46; padding: 2px 6px; border-radius: 4px; }
        .value-red { color: #f87171; font-weight: bold; background: #7f1d1d; padding: 2px 6px; border-radius: 4px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 64px; background: #111827; border-top: 1px solid #24344d; display: flex; }
        .nav-tab { background: none; border: none; color: #64748b; font-size: 12px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 4px; }
        .nav-tab.active { color: var(--accent); }
        .loader { text-align: center; color: #94a3b8; padding: 40px 0; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); width: 32px; height: 32px; border-radius: 50%; border-left-color: var(--accent); animation: spin 1s linear infinite; margin: 0 auto 12px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="header-top">
            <span class="brand">QuantRace Mobile</span>
            <span id="statusLabel" class="status">ONLINE</span>
        </div>
        <div>
            <input type="password" id="geminiApiKey" placeholder="Enter Gemini API Key" oninput="saveKey()">
        </div>
    </header>

    <div class="app-body">
        <!-- RACES SCREEN -->
        <div id="listScreen" class="screen active">
            <h3 style="margin-top:0; color: #94a3b8; font-size: 14px;">SELECT MEETING</h3>
            <div class="race-card" onclick="runMobileAnalysis('Flemington (AUS) - Race 8 (1200m Sprint)')">
                <span style="font-size:10px; color:#94a3b8; font-weight:bold;">AUSTRALIA</span>
                <span class="venue">Flemington - R8</span>
                <span class="time">Turf • Next Jump</span>
            </div>
            <div class="race-card" onclick="runMobileAnalysis('Doomben (AUS) - Race 4 (1200m Open)')">
                <span style="font-size:10px; color:#94a3b8; font-weight:bold;">AUSTRALIA</span>
                <span class="venue">Doomben - R4</span>
                <span class="time">Turf • Upcoming</span>
            </div>
            <div class="race-card" onclick="runMobileAnalysis('Ascot (UK) - Race 4 (2400m Turf)')">
                <span style="font-size:10px; color:#94a3b8; font-weight:bold;">UNITED KINGDOM</span>
                <span class="venue">Ascot - R4</span>
                <span class="time">Turf • Tonight</span>
            </div>
        </div>

        <!-- ANALYSIS SCREEN -->
        <div id="analysisScreen" class="screen">
            <div class="analysis-box" id="analysisResult">
                <h3 style="margin-top:0;">No Race Selected</h3>
                <p style="color: #94a3b8; font-size: 14px; line-height: 1.5;">Select a meeting from the 'Races' tab to calculate win percentages.</p>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <button id="tabList" class="nav-tab active" onclick="switchScreen('list')"><span>🏇</span><span>Races</span></button>
        <button id="tabAnalysis" class="nav-tab" onclick="switchScreen('analysis')"><span>📊</span><span>Analysis</span></button>
    </div>

<script>
    // Load key on open
    document.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem("quant_gemini_key");
        if (savedKey) {
            document.getElementById('geminiApiKey').value = savedKey;
        }
    });

    // Save key automatically when typed
    window.saveKey = () => {
        const keyVal = document.getElementById('geminiApiKey').value.trim();
        localStorage.setItem("quant_gemini_key", keyVal);
    };

    // Screen navigation layout toggles
    window.switchScreen = (screenName) => {
        const list = document.getElementById('listScreen');
        const analysis = document.getElementById('analysisScreen');
        const tList = document.getElementById('tabList');
        const tAnalysis = document.getElementById('tabAnalysis');

        if (screenName === 'list') {
            list.classList.add('active'); analysis.classList.remove('active');
            tList.classList.add('active'); tAnalysis.classList.remove('active');
        } else {
            analysis.classList.add('active'); list.classList.remove('active');
            tAnalysis.classList.add('active'); tList.classList.remove('active');
        }
    };

    // Direct Native Fetch Call to Gemini API Bypass
    window.runMobileAnalysis = async (raceName) => {
        const key = document.getElementById('geminiApiKey').value.trim();
        const display = document.getElementById('analysisResult');
        const status = document.getElementById('statusLabel');

        if (!key) return alert("Please enter your Gemini API Key first!");

        switchScreen('analysis');
        status.innerText = "SIMULATING...";
        status.style.color = "var(--accent)";
        
        display.innerHTML = `
            <div class="loader">
                <div class="spinner"></div>
                <h4>Running Quantitative Model</h4>
                <p style="font-size:12px; color:#64748b;">Processing fields for ${raceName}...</p>
            </div>
        `;

        const promptText = `You are a Horse Racing Quant. Generate a realistic field of 5 horses for ${raceName} with simulated bookie odds. Calculate their win percentages (must equal exactly 100%) and fair prices. Return ONLY a clean HTML table with columns: Horse, Win %, Fair, Live, Edge. Highlight value wins using class="value-green" or poor outcomes using class="value-red". Finish with an HTML header <h4>Pro-Insight</h4> and a brief 2-sentence summary wrap up. No markdown code blocks, backticks, or raw text formatting wrappers outside the layout elements.`;

        try {
            // Using a raw HTTP post request directly to Google endpoint bypasses all library dependencies
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
            });

            const resData = await response.json();
            
            if (!response.ok) {
                throw new Error(resData.error?.message || "Failed communicating with engine.");
            }

            let textOutput = resData.candidates[0].content.parts[0].text;
            textOutput = textOutput.replace(/```html/g, "").replace(/```/g, "");

            display.innerHTML = `<h3 style="margin-top:0; border-bottom:1px solid #24344d; padding-bottom:8px; font-size:16px;">${raceName}</h3>${textOutput}`;
            status.innerText = "ONLINE";
            status.style.color = "#64748b";

        } catch (e) {
            display.innerHTML = `<div style="color:#f87171; padding:15px; background:#451a03; border-radius:8px; font-size:14px;"><b>Model Run Error</b><br>${e.message}</div>`;
            status.innerText = "ERROR";
            status.style.color = "#f87171";
        }
    };
</script>
</body>
</html>
