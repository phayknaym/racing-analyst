<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Private Racing Analytics</title>
    <script type="importmap">
      { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
    </script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        textarea { width: 100%; height: 150px; background: #333; color: #fff; border: 1px solid #555; }
        button { background: #27ae60; color: white; padding: 10px 20px; border: none; cursor: pointer; margin-top: 10px; }
        #output { margin-top: 20px; background: #222; padding: 15px; border-radius: 8px; border-left: 5px solid #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #444; padding: 8px; text-align: left; }
        th { background: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇦🇺 Horse Racing Probability Engine</h1>
        <input type="password" id="apiKey" placeholder="Enter Gemini API Key" style="width: 100%; padding: 10px; margin-bottom: 10px;">
        
        <h3>Paste Race Data (Runners, Odds, Weather):</h3>
        <textarea id="raceData" placeholder="Copy race details from Racing.com or Punters.com.au here..."></textarea>
        
        <button onclick="calculateProbabilities()">Run Probability Model</button>

        <div id="loading" style="display:none;">Analysing field and calculating percentages...</div>
        <div id="output">
            <em>Results will appear here.</em>
        </div>
    </div>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        window.calculateProbabilities = async () => {
            const key = document.getElementById('apiKey').value;
            const data = document.getElementById('raceData').value;
            const output = document.getElementById('output');
            const loader = document.getElementById('loading');

            if (!key) return alert("Please enter your Gemini API Key!");

            loader.style.display = "block";
            const genAI = new GoogleGenerativeAI(key);
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

            const prompt = `Act as a Horse Racing Quant. Analyze this data: ${data}. 
            Provide a table with: Horse Name, Win % (totaling 100%), Fair Odds, and Value Check. 
            Focus on Australian track conditions and sectional fitness.`;

            try {
                const result = await model.generateContent(prompt);
                // Convert Markdown response to HTML-friendly text
                output.innerHTML = result.response.text().replace(/\n/g, '<br>');
            } catch (error) {
                output.innerText = "Error: " + error.message;
            } finally {
                loader.style.display = "none";
            }
        };
    </script>
</body>
</html>
